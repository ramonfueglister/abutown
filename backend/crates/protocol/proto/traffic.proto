syntax = "proto3";
package traffic.v1;

// Wire schema for the winterthur-traffic WS gateway (Task 8). The server
// simulates the fleet headless at 10 Hz and publishes per-AOI-cell frames at
// 5 Hz over `/traffic`; the browser client (Task 9) subscribes to the cells it
// can see and renders the vehicles inside them.
//
// Quantisation keeps frames small: positions to the decimetre, speeds to
// 0.25 m/s. These are lossy on purpose — the client interpolates between
// frames, so sub-decimetre precision would only cost bandwidth.

// Client → server. A subscription delta: cells to start / stop receiving. The
// server keyframes every newly-subscribed cell immediately.
message TrafficClientMsg {
  repeated uint32 subscribe_cells = 1;
  repeated uint32 unsubscribe_cells = 2;
  optional bool subscribe_flow = 3;   // NEW: true=on, false=off
}

// One vehicle's kinematic state within a cell frame.
message VehicleState {
  // Wire-stable vehicle id: `slot | (generation << 15)`. The low 15 bits are
  // the fleet slot (cap 30000 < 32768); the high 17 bits are the slot's reuse
  // generation, so a slot recycled after despawn gets a distinct id and a
  // client dead-reckoning by id never confuses it with its former occupant.
  // Opaque to the client — use it only as an identity key, never decode it.
  uint32 id = 1;
  uint32 lane = 2;  // Lane id the vehicle occupies.
  uint32 s_q = 3;   // Arc position along the lane, quantised: round(s * 10) dm.
  uint32 v_q = 4;   // Speed, quantised: round(v * 4) in 0.25 m/s units.
  // Vehicle class: 0 car, 1 delivery van, 2 HGV (trips.bin byte 13 → kernel
  // IDM table → silhouette selection client-side). Additive field — absent on
  // old frames decodes as 0 (car), which matches the previously uniform fleet.
  uint32 class = 5;
}

// The state of a single AOI cell at a given tick.
//
//  * `keyframe = true`: `vehicles` is the full membership of the cell (sent on
//    subscribe and every 5 s per cell); `departed` is empty.
//  * `keyframe = false`: a delta — `vehicles` are the entries that changed
//    (moved / entered), `departed` are ids that left the cell since the last
//    frame for this cell.
message CellFrame {
  uint32 cell = 1;
  uint64 tick = 2;
  bool keyframe = 3;
  repeated VehicleState vehicles = 4;
  repeated uint32 departed = 5;
}

// A far-LOD, per-edge aggregate of vehicle flow: how many vehicles are on an
// edge and their mean speed, without per-vehicle identity. Intended for
// clients zoomed out past the point where individual vehicles are legible —
// cheaper to send than a CellFrame per subscribed cell.
message FlowState {
  uint32 edge = 1;    // edge id
  uint32 count = 2;   // vehicles on edge, saturating at 255
  uint32 v_q = 3;     // mean speed, 0.25 m/s units (same quantization as VehicleState.v_q)
}

// One publish tick's full flow snapshot. Self-contained (no deltas) — the
// client replaces its whole flow picture with each frame.
message FlowFrame {
  uint64 tick = 1;
  repeated FlowState edges = 2;  // only edges with count >= 1; self-contained (no deltas)
}

// Server → client. A batch of cell frames produced by one publish tick. Only
// cells the session subscribes to, and only cells that changed (or are due a
// keyframe), appear.
message TrafficServerMsg {
  repeated CellFrame cells = 1;
  optional FlowFrame flow = 2;   // NEW
}
