syntax = "proto3";
package abutown.v1;

// === Primitives ===

message ChunkCoord { sint32 x = 1; sint32 y = 2; }
message WorldCoord { float x = 1; float y = 2; }

// Convention for all messages/enums below: when removing a field or enum
// variant, move its tag and name into `reserved` blocks. Never reuse a tag.
// `buf breaking` (see `npm run lint:proto-breaking`) enforces this on PRs.

enum Direction {
  reserved 100 to max;
  DIRECTION_UNSPECIFIED = 0;
  DIRECTION_N = 1;
  DIRECTION_NE = 2;
  DIRECTION_E = 3;
  DIRECTION_SE = 4;
  DIRECTION_S = 5;
  DIRECTION_SW = 6;
  DIRECTION_W = 7;
  DIRECTION_NW = 8;
}

enum ChunkState {
  reserved 100 to max;
  CHUNK_STATE_UNSPECIFIED = 0;
  CHUNK_STATE_ASLEEP = 1;
  CHUNK_STATE_WARM = 2;
  CHUNK_STATE_ACTIVE = 3;
  CHUNK_STATE_HOT = 4;
}

enum TileKind {
  reserved 100 to max;
  TILE_KIND_UNSPECIFIED = 0;
  TILE_KIND_GRASS = 1;
  TILE_KIND_WATER = 2;
  TILE_KIND_ROAD = 3;
  TILE_KIND_BUILDING_FOOTPRINT = 4;
}

enum VehicleKind {
  reserved 2, 100 to max;
  reserved "VEHICLE_KIND_TRAM";
  VEHICLE_KIND_UNSPECIFIED = 0;
  VEHICLE_KIND_CAR = 1;
}

// === Server → Client envelope ===

message ServerMessage {
  reserved 100 to max;
  oneof body {
    Hello hello = 1;
    TilePulse tile_pulse = 2;
    MobilityChunkDelta mobility_chunk_delta = 3;
    MobilityChunkSnapshot mobility_chunk_snapshot = 4;
    WorldEvent world_event = 5;
    ServerError error = 6;
    EconomySnapshot economy_snapshot = 7;
  }
}

message EconomySnapshot {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint64 tick = 3;
  repeated EconomyMarket markets = 4;
  repeated EconomyMarketGood goods = 5;
}

message EconomyMarket {
  uint32 market_id = 1;
  string name = 2;
  sint32 tile_x = 3;
  sint32 tile_y = 4;
  int64 wage_paid_last_tick = 5; // raw i64; client divides by ECONOMY_SCALE (1000) for display
}

message EconomyMarketGood {
  uint32 market_id = 1;
  uint32 good_id = 2;
  int64 last_settlement_price = 3;
  int64 ewma_reference_price = 4;
  int64 traded_qty_last_tick = 5;
  int64 unmet_demand_last_tick = 6;
  int64 unsold_supply_last_tick = 7;
}

message ServerError {
  uint32 protocol_version = 1;
  // world_id is empty string when not applicable to a specific world.
  string world_id = 2;
  string code = 3;
  string message = 4;
}

message Hello {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint32 chunk_size = 3;
}

message TilePulse {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint64 tick = 3;
  uint64 version = 4;
  ChunkCoord coord = 5;
  uint32 local_index = 6;
}

message MobilityChunkDelta {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint64 tick = 3;
  ChunkCoord chunk = 4;
  repeated AgentMobility changed_agents = 5;
  repeated VehicleMobility changed_vehicles = 6;
  repeated string left_agents = 7;
  repeated string left_vehicles = 8;
}

message MobilityChunkSnapshot {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint64 tick = 3;
  ChunkCoord chunk = 4;
  repeated AgentMobility agents = 5;
  repeated VehicleMobility vehicles = 6;
}

message WorldEvent {
  reserved 100 to max;
  oneof event {
    TileKindSetEvent tile_kind_set = 1;
  }
}

message TileKindSetEvent {
  uint32 protocol_version = 1;
  string event_id = 2;
  string command_id = 3;
  string world_id = 4;
  uint64 tick = 5;
  uint64 version = 6;
  ChunkCoord coord = 7;
  uint32 local_index = 8;
  TileKind kind = 9;
}

// === Client → Server envelope ===

message ClientMessage {
  reserved 100 to max;
  oneof body {
    ChunkSubscribe chunk_subscribe = 1;
    ChunkUnsubscribe chunk_unsubscribe = 2;
  }
}

message ChunkSubscribe {
  uint32 protocol_version = 1;
  repeated ChunkCoord coords = 2;
}

message ChunkUnsubscribe {
  uint32 protocol_version = 1;
  repeated ChunkCoord coords = 2;
}

// === HTTP request/response bodies ===

message ClientCommand {
  reserved 100 to max;
  oneof command {
    SetTileKindCommand set_tile_kind = 1;
  }
}

message SetTileKindCommand {
  uint32 protocol_version = 1;
  string world_id = 2;
  string command_id = 3;
  ChunkCoord coord = 4;
  uint32 local_index = 5;
  TileKind kind = 6;
}

message CommandResponse {
  reserved 100 to max;
  oneof outcome {
    CommandAccepted accepted = 1;
    CommandRejected rejected = 2;
  }
}

message CommandAccepted {
  uint32 protocol_version = 1;
  string world_id = 2;
  string command_id = 3;
  WorldEvent event = 4;
}

message CommandRejected {
  uint32 protocol_version = 1;
  // world_id / command_id are empty when the rejection happens before
  // either could be parsed from the request.
  string world_id = 2;
  string command_id = 3;
  string code = 4;
  string message = 5;
}

enum PersistenceHealthStatus {
  reserved 100 to max;
  PERSISTENCE_HEALTH_STATUS_UNSPECIFIED = 0;
  PERSISTENCE_HEALTH_STATUS_STARTING = 1;
  PERSISTENCE_HEALTH_STATUS_HEALTHY = 2;
  PERSISTENCE_HEALTH_STATUS_DEGRADED = 3;
  PERSISTENCE_HEALTH_STATUS_STALE = 4;
}

message PersistenceHealth {
  PersistenceHealthStatus status = 1;
  string world_id = 2;
  uint64 mobility_tick = 3;
  uint64 last_attempt_unix_ms = 4;
  uint64 last_success_unix_ms = 5;
  uint32 consecutive_failures = 6;
  string last_error = 7;
  uint64 freshness_ms = 8;
}

message HealthResponse {
  uint32 protocol_version = 1;
  string service = 2;
  string world_id = 3;
  bool ok = 4;
  PersistenceHealth persistence = 5;
}

message WorldSummary {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint32 chunk_size = 3;
  repeated ChunkCoord loaded_chunks = 4;
  uint32 tick_period_ms = 5;
  uint64 sim_time = 6;
}

message ChunkSnapshot {
  uint32 protocol_version = 1;
  string world_id = 2;
  ChunkCoord coord = 3;
  uint64 chunk_version = 4;
  ChunkState chunk_state = 5;
  uint32 tile_count = 6;
  repeated TileMutation tiles = 7;
}

message TileMutation {
  uint32 local_index = 1;
  TileKind kind = 2;
  uint64 version = 3;
}

message MobilitySnapshot {
  uint32 protocol_version = 1;
  string world_id = 2;
  uint64 tick = 3;
  repeated AgentMobility agents = 4;
  repeated VehicleMobility vehicles = 5;
  repeated Stop stops = 6;
}

// === Mobility entity types ===

message AgentMobility {
  string id = 1;
  AgentState state = 2;
  WorldCoord world_coord = 3;
  Direction direction = 4;
  string sprite_key = 5;
  uint32 plan_cursor = 6;
  uint64 age_seconds = 7;
}

message AgentState {
  reserved 4, 5, 100 to max;
  reserved "boarding", "alighting";
  oneof state {
    Walking walking = 1;
    WaitingAtStop waiting_at_stop = 2;
    InVehicle in_vehicle = 3;
    AtActivity at_activity = 6;
  }
}

message Walking { string link_id = 1; float progress = 2; }
message WaitingAtStop { string stop_id = 1; }
message InVehicle { string vehicle_id = 1; uint32 seat_index = 2; }
message AtActivity { string activity_id = 1; }

message VehicleMobility {
  string id = 1;
  VehicleKind kind = 2;
  string route_id = 3;
  uint32 link_index = 4;
  float progress = 5;
  uint32 capacity = 6;
  repeated string occupants = 7;
  uint32 dwell_ticks_remaining = 8;
  WorldCoord world_coord = 9;
  Direction direction = 10;
  string sprite_key = 11;
}

message Stop {
  string id = 1;
  string route_id = 2;
  uint32 link_index = 3;
  float progress = 4;
  repeated string waiting_agents = 5;
}
