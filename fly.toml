# The ONE Abutown process (M1): traffic + world-core sim + /traffic + /live
# WS gateways + card-hand API. World state persists to Supabase Postgres
# every 5 s and resumes frozen-time on boot. SINGLE-WRITER: never scale >1.
app = "abutown-abutopia"
primary_region = "lhr"  # EU, near Supabase eu-west-1 (cuts persist write latency)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

# shared-cpu-2x (not 1x): under peak sim load (morning/evening commute, ~21k
# active trips) the single-vCPU machine starved the async snapshot write,
# pushing world_core_snapshots upserts from <1 s to 20–43 s. A second vCPU
# gives the serialize+write headroom to run without contending the tick loop.
#
# memory 2gb (not 1gb): on 1 GB the process OOM-killed under peak load and
# crash-looped to Fly's max-restart limit (2026-07-07 OUTAGE). RSS ran ~882 MB
# steady (139 647-citizen ECS world + traffic net + router), and the snapshot
# payload grows to ~2.5 MB at peak commute (ActiveTrips ∝ trips in flight);
# serializing it spiked RSS past the 1 GB cgroup limit → SIGKILL. 2 GB gives
# headroom over the steady RSS + serialization spike. NOTE: this is a mitigation
# — the proper fix is bounding/streaming the snapshot payload (delta snapshots).
# Still ONE machine — single-writer invariant holds; only scale vertically.
[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
