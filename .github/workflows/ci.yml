name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo test --manifest-path backend/Cargo.toml --workspace
      - run: npx playwright install chromium
      - run: npm run test:e2e
