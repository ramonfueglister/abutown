name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"

jobs:
  frontend:
    name: Frontend unit and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate protobuf TypeScript
        run: npm run generate:proto

      - name: Type-check (src + tests + scripts)
        run: npm run typecheck

      - name: Run frontend tests
        run: npm test

      - name: Run production build
        run: npm run build

  rust:
    name: Rust lint and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: abutown
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abutown"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Set ABUTOWN_TEST_DATABASE_URL so the opt-in Postgres integration tests
      # (postgres_*_store, the http restart/idempotency tests) actually RUN here
      # instead of silently early-returning — they rotted in CI for exactly this
      # reason (see PR #94). They isolate onto unique test:{uuid} world ids and
      # clean up after themselves, so they are parallel-safe on a shared db.
      ABUTOWN_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/abutown
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/abutown
      SUPABASE_URL: http://127.0.0.1:9999
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler and postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler postgresql-client

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            backend/target
          key: rust-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Prepare test database schema
        run: |
          psql "$DATABASE_URL" <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY
          );
          DO $$
          BEGIN
            CREATE ROLE authenticated;
          EXCEPTION
            WHEN duplicate_object THEN NULL;
          END
          $$;
          CREATE OR REPLACE FUNCTION auth.uid()
          RETURNS uuid
          LANGUAGE sql
          STABLE
          AS $$ SELECT NULL::uuid $$;
          SQL

      - name: Check Rust formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Run Clippy (workspace, all targets, deny warnings)
        run: cargo clippy --manifest-path backend/Cargo.toml --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --manifest-path backend/Cargo.toml --workspace

  e2e:
    name: Browser smoke
    runs-on: ubuntu-latest
    services:
      # For the world smoke's restart-resume assert (5): sim-server persists
      # to this db and must log "resuming world-core from persisted snapshot"
      # after a kill + relaunch. Same service shape as the rust job.
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: abutown
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d abutown"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ABUTOWN_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/abutown
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler and postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler postgresql-client

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            backend/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            rust-release-${{ runner.os }}-
            rust-${{ runner.os }}-

      # sim-server's boot runs the card-hand migration, which references
      # Supabase's auth schema — same prep as the rust job.
      - name: Prepare test database schema
        run: |
          psql "$ABUTOWN_TEST_DATABASE_URL" <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY
          );
          DO $$
          BEGIN
            CREATE ROLE authenticated;
          EXCEPTION
            WHEN duplicate_object THEN NULL;
          END
          $$;
          CREATE OR REPLACE FUNCTION auth.uid()
          RETURNS uuid
          LANGUAGE sql
          STABLE
          AS $$ SELECT NULL::uuid $$;
          SQL

      - name: Install npm dependencies
        run: npm ci

      - name: Generate protobuf TypeScript
        run: npm run generate:proto

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Render-only smoke: the card hand's signed-out shell + login render
      # without a backend (it only calls the API after login), so this step
      # needs no Rust build, Postgres, or Supabase — the script spawns its
      # own vite dev server with dummy VITE_SUPABASE_* env.
      - name: Run browser smoke test
        run: node scripts/smoke-cardhand.mjs

      # World smoke (M1 Task 16) in --no-render mode: CI has no baked world
      # pyramid (data/winterthur/world is 77 MB and gitignored; baking it in
      # CI is far too heavy), so the smoke talks to /live + /health directly
      # via two Node WS clients decoding with the same generated proto. All
      # committed data artefacts (trafficnet.json, trips.bin, simworld.json,
      # economy.json) suffice for the sim-server itself. With the Postgres
      # env above the restart-resume assert runs too. The full browser render
      # variant of this smoke is the mandatory LOCAL gate.
      - name: Run world smoke (wire-only, with restart-resume)
        run: node scripts/smoke-world.mjs --no-render
